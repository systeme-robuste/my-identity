name = "my-identity-api"
main = "src/index.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Variables (non-secret). Secrets are set via `wrangler secret put` or in CI.
[vars]
ENVIRONMENT = "development"
LOG_LEVEL = "info"
APP_BASE_URL = "http://localhost:5173"
RENDERER_BASE_URL = "http://localhost:8788"
APP_NAME = "My Identity API"
APP_VERSION = "0.1.0"

# --- D1 (edge cache for read-through) ---
[[d1_databases]]
binding = "DB_CACHE"
database_name = "my-identity-cache"
database_id = "00000000-0000-0000-0000-000000000000"

# --- KV namespaces ---
[[kv_namespaces]]
binding = "SESSIONS"
id = "00000000000000000000000000000000"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "00000000000000000000000000000000"

[[kv_namespaces]]
binding = "AUDIT_LOG"
id = "00000000000000000000000000000000"

# --- R2 bucket ---
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "my-identity-media"

# --- Production overrides (used by deploy-api.yml) ---
[env.production]
name = "my-identity-api"
routes = [
  { pattern = "api.myidentity.app/*", custom_domain = true }
]
[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "info"
APP_BASE_URL = "https://studio.myidentity.app"
RENDERER_BASE_URL = "https://renderer.myidentity.app"
