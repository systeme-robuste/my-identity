version: "3.9"

# My Identity — Local development stack
# Usage:
#   docker compose up -d                # start postgres + redis (used by stub)
#   pnpm install                        # install workspace deps
#   pnpm dev                            # run all apps in dev mode
#
# Note: this is for LOCAL development only. Production runs on Cloudflare
# Workers + Neon Postgres + D1/KV/R2 — no Docker in production.

services:
  postgres:
    image: postgres:16-alpine
    container_name: myidentity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: myidentity
      POSTGRES_PASSWORD: myidentity_dev
      POSTGRES_DB: myidentity_dev
    ports:
      - "5432:5432"
    volumes:
      - myidentity-pg-data:/var/lib/postgresql/data
      - ./packages/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myidentity -d myidentity_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: myidentity-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - myidentity-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: myidentity-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  myidentity-pg-data:
  myidentity-redis-data:
